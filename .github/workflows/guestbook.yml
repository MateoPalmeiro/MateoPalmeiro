name: Update Guestbook

on:
  issue_comment:
    types: [created]

jobs:
  update-guestbook:
    runs-on: ubuntu-latest
    if: github.event.issue.number == 1 && !github.event.comment.user.bot
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update guestbook section
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = 1;
            const per_page = 100;
            let allComments = [];
            let page = 1;
            while (true) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                per_page,
                page,
              });
              allComments.push(...comments);
              if (comments.length < per_page) break;
              page++;
            }
            // Deduplicate by user (keep latest comment)
            const seen = new Map();
            for (const c of allComments) {
              seen.set(c.user.login, c);
            }
            const unique = [...seen.values()].reverse().slice(0, 30);
            let md = '';
            for (const c of unique) {
              const avatar = c.user.avatar_url;
              const login = c.user.login;
              const profile = c.user.html_url;
              md += `<a href="${profile}"><img src="${avatar}" width="50" height="50" alt="@${login}" title="@${login}" style="border-radius:50%" /></a>\n`;
            }
            if (unique.length === 0) {
              md = '_Nadie ha firmado todavía. ¡Sé el primero!_\n';
            }
            const fs = require('fs');
            let readme = fs.readFileSync('README.md', 'utf8');
            const start = '<!-- GUESTBOOK:START -->';
            const end = '<!-- GUESTBOOK:END -->';
            const regex = new RegExp(`${start}[\\s\\S]*?${end}`);
            readme = readme.replace(regex, `${start}\n${md}${end}`);
            fs.writeFileSync('README.md', readme);

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || (git commit -m "docs: update guestbook" && git push)
