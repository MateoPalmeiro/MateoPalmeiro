name: Update Guestbook

on:
  issue_comment:
    types: [created]
  workflow_dispatch:

jobs:
  update-guestbook:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.issue.number == 1 && !github.event.comment.user.bot)
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update guestbook section
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = 1;
            const per_page = 100;
            let allComments = [];
            let page = 1;
            while (true) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                per_page,
                page,
              });
              allComments.push(...comments);
              if (comments.length < per_page) break;
              page++;
            }
            // Show all comments (newest first), limit 30
            const entries = allComments.reverse().slice(0, 30);
            let md = '';
            if (entries.length === 0) {
              md = '_Nadie ha firmado todavía. ¡Sé el primero!_\n';
            } else {
              md += '<table>\n';
              for (const c of entries) {
                const avatar = c.user.avatar_url;
                const login = c.user.login;
                const profile = c.user.html_url;
                // Sanitize message: remove HTML tags, trim, limit length
                let msg = c.body.replace(/<[^>]*>/g, '').trim();
                if (msg.length > 150) msg = msg.substring(0, 150) + '…';
                const date = new Date(c.created_at).toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });
                md += `<tr>\n`;
                md += `  <td align="center" width="80"><a href="${profile}"><img src="${avatar}" width="45" height="45" alt="@${login}" style="border-radius:50%" /></a></td>\n`;
                md += `  <td><strong><a href="${profile}">@${login}</a></strong> <sub>${date}</sub><br/>${msg}</td>\n`;
                md += `</tr>\n`;
              }
              md += '</table>\n';
            }
            const fs = require('fs');
            let readme = fs.readFileSync('README.md', 'utf8');
            const start = '<!-- GUESTBOOK:START -->';
            const end = '<!-- GUESTBOOK:END -->';
            const regex = new RegExp(`${start}[\\s\\S]*?${end}`);
            readme = readme.replace(regex, `${start}\n${md}${end}`);
            fs.writeFileSync('README.md', readme);

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || (git commit -m "docs: update guestbook" && git push)
